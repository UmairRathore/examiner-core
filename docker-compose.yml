version: "3.9"

services:

  application:
    build:
      context: ./application
    container_name: laravel_app
    ports:
      - "8001:8000"
    volumes:
      - ./application:/var/www/html
    depends_on:
      - db
      - redis
      - ai-service
    env_file:
      - ./application/.env.docker

  ai-service:
    build:
      context: ./ai-service
    container_name: ai_service
    ports:
      - "8000:8000"
    env_file:
      - ./ai-service/.env

  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_DB: aoleveltutor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: aiaolevelstutor
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: redis_cache
    ports:
      - "6379:6379"

volumes:
  pgdata:
